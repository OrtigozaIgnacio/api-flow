<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api-flow | Portal Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-azul-francia { background-color: #0050A0; }
        .hover-azul-francia:hover { background-color: #003D7A; }
        .text-azul-francia { color: #0050A0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-md border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-50 text-azul-francia mb-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <h1 class="text-2xl font-semibold tracking-tight text-gray-900">Portal Profesional</h1>
            <p class="text-sm text-gray-500 mt-2">Gestioná tu agenda con Api-flow</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                <input type="email" id="email" required placeholder="tu@correo.com" 
                    class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••" 
                    class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <div id="error-message" class="hidden text-red-500 text-sm font-medium text-center"></div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-azul-francia hover-azul-francia text-white font-medium py-3 px-4 rounded-lg transition-colors shadow-md">
                Ingresar
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.innerHTML = 'Verificando...';
            submitBtn.disabled = true;
            errorDiv.classList.add('hidden');

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('api_flow_token', data.access_token);
                    // Redirige al dashboard del cliente
                    window.location.href = 'index.html';
                } else {
                    const errorData = await response.json();
                    errorDiv.innerText = errorData.detail || 'Credenciales incorrectas';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.innerText = 'Error al conectar con el servidor.';
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.innerHTML = 'Ingresar';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
