<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api-flow | Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f7; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="antialiased text-[#1d1d1f]">

    <nav class="glass fixed top-0 w-full z-50 h-12 flex items-center justify-between px-8">
        <div class="flex items-center gap-4">
            <span class="font-semibold text-lg tracking-tight">Api-flow <span class="font-light text-gray-500">Admin</span></span>
        </div>
        <div class="flex items-center gap-6 text-sm font-light">
            <a href="#" class="hover:text-blue-600 transition">Métricas</a>
            <a href="#" class="hover:text-blue-600 transition">Clientes</a>
            <button onclick="openPasswordModal()" class="text-gray-500 hover:text-gray-900 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
            <button onclick="logout()" class="bg-[#1d1d1f] text-white px-4 py-1.5 rounded-full text-xs hover:bg-black transition shadow-sm">Salir</button>
        </div>
    </nav>

    <main class="pt-24 pb-12 max-w-6xl mx-auto px-6">
        
        <header class="mb-12">
            <h1 class="text-4xl font-semibold tracking-tight mb-2">Resumen Global</h1>
            <p class="text-gray-500 font-light">Control de infraestructura y facturación de Api-flow.</p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="bg-white p-6 rounded-3xl shadow-sm hover:shadow-md transition">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Clientes Totales</p>
                <h3 class="text-3xl font-medium" id="stat-total">--</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm hover:shadow-md transition">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Activos</p>
                <h3 class="text-3xl font-medium text-green-500" id="stat-active">--</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm hover:shadow-md transition">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">MRR (USD)</p>
                <h3 class="text-3xl font-medium" id="stat-mrr">$ --</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm hover:shadow-md transition border-2 border-dashed border-gray-200 flex flex-col justify-center items-center cursor-pointer hover:bg-gray-50">
                <span class="text-2xl mb-1">+</span>
                <p class="text-xs font-medium">Nuevo Cliente</p>
            </div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm overflow-hidden">
            <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-xl font-medium">Cartera de Profesionales</h2>
                <input type="text" placeholder="Buscar..." class="bg-gray-100 px-4 py-1.5 rounded-full text-sm outline-none focus:ring-1 ring-blue-500">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-xs text-gray-400 uppercase tracking-wider">
                        <tr>
                            <th class="px-8 py-4 font-semibold">Profesional</th>
                            <th class="px-8 py-4 font-semibold">Nicho</th>
                            <th class="px-8 py-4 font-semibold">Precio</th>
                            <th class="px-8 py-4 font-semibold">Estado</th>
                            <th class="px-8 py-4 font-semibold">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-gray-100" id="professional-list">
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <div id="passwordModal" class="fixed inset-0 bg-black bg-opacity-40 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
            <h2 class="text-xl font-semibold mb-1">Seguridad</h2>
            <p class="text-xs text-gray-500 mb-6">Actualizá tu clave de acceso.</p>
            
            <form id="passwordForm" class="space-y-4">
                <div>
                    <input type="password" id="oldPassword" required placeholder="Contraseña actual" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <input type="password" id="newPassword" required placeholder="Nueva contraseña" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <p id="pwdMsg" class="text-xs text-center hidden"></p>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closePasswordModal()" class="w-1/2 px-4 py-2 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition">Cancelar</button>
                    <button type="submit" class="w-1/2 px-4 py-2 text-sm text-white bg-[#0050A0] hover:bg-blue-800 rounded-lg transition">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
